<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> وزارة الداخلية</title>
    <!-- Google Fonts: Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="main-container">
        <header class="header">
            <h1>وزارة الداخلية</h1>
            <h2>الإدارة العامة للأحوال المدنية</h2>
            <div class="description">
                <p>المستند المرفق طرفكم هو</p>
                <p class="accent-text">افادة على أنه منفصل </p>
                <p>صادر عن وزارة الداخلية بتاريخ 2026/02/22</p>
                <p>والبيانات المتوفرة به يجب أن تتطابق مع بيانات المواطن الموضحة أدناه</p>
            </div>
            <p class="photo-title">الصورة الشخصية</p>
        </header>

        <section class="photo-section">
            <div class="photo-wrapper">
                <img src="images/WhatsApp Image 2026-03-24 at 1.44.32 PM.jpeg" alt="الصورة الشخصية" id="profile-img">
            </div>
        </section>

        <section class="form-section">
            <form id="life-form">
                <div class="input-group">
                    <label for="id-number">رقم الهوية</label>
                    <input type="text" id="id-number" placeholder="409380201">
                </div>

                <div class="input-group">
                    <label for="full-name">الإسم</label>
                    <input type="text" id="full-name" placeholder="مؤمن رامي صبحي أبوسل">
                </div>

                <div class="input-group">
                    <label for="birth-date">تاريخ الميلاد</label>
                    <input type="text" id="birth-date" placeholder="14/11/2003">
                </div>

                <div class="input-group">
                    <label for="gender">الجنس</label>
                    <input type="text" id="gender" placeholder="ذكر">
                </div>
            </form>
        </section>
    </div>
</body>

</html>
